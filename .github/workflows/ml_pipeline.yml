name: Autonomous ML CI/CD

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: |
        docker build -t autonomous-agent:latest .

    - name: Run container
      run: |
        docker run -d -p 8000:8000 autonomous-agent:latest