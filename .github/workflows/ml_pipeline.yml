name: Autonomous ML CI/CD

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ML pipeline
      run: |
        python main.py

    - name: Verify model files
      run: |
        echo "Checking model files..."
        ls -R models || true

    - name: Build Docker image
      run: |
        docker build -t autonomous-agent:latest .

    - name: Stop old container
      run: |
        docker stop autonomous-agent || true
        docker rm autonomous-agent || true

    - name: Start container
      run: |
        docker run -d \
          --name autonomous-agent \
          --restart always \
          -p 8000:8000 \
          -p 5000:5000 \
          autonomous-agent:latest

    - name: Show container status
      run: |
        docker ps -a
        docker logs autonomous-agent

    - name: Wait for FastAPI
      run: |
        echo "Waiting for FastAPI..."

        for i in {1..40}; do
          if curl -s http://localhost:8000/docs > /dev/null; then
            echo "FastAPI is ready"
            exit 0
          fi

          echo "FastAPI not ready yet..."
          docker ps
          sleep 5
        done

        echo "FastAPI failed to start"
        docker logs autonomous-agent
        exit 1

    - name: Wait for MLflow
      run: |
        echo "Waiting for MLflow..."

        for i in {1..40}; do
          if curl -s http://localhost:5000 > /dev/null; then
            echo "MLflow is ready"
            exit 0
          fi

          echo "MLflow not ready yet..."
          sleep 5
        done

        echo "MLflow failed to start"
        docker logs autonomous-agent
        exit 1