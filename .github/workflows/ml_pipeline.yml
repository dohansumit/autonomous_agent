name: Autonomous ML CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: self-hosted

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t autonomous-agent:latest .

      - name: Stop old container
        run: |
          docker stop autonomous-agent || true
          docker rm autonomous-agent || true

      - name: Start container
        run: |
          docker run -d \
            --name autonomous-agent \
            --restart always \
            -p 8000:8000 \
            -p 5000:5000 \
            autonomous-agent:latest

      - name: Check container logs
        run: |
          docker ps
          docker logs autonomous-agent

      - name: Wait for FastAPI
        run: |
          for i in 1 2 3 4 5; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "FastAPI ready"
              exit 0
            fi
            sleep 5
          done

          docker logs autonomous-agent
          exit 1

      - name: Wait for MLflow
        run: |
          for i in 1 2 3 4 5; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "MLflow ready"
              exit 0
            fi
            sleep 5
          done

          docker logs autonomous-agent
          exit 1