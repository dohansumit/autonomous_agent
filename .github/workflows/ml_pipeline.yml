name: Autonomous ML CI/CD

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ML pipeline test
      run: |
        python main.py

    - name: Build Docker image
      run: |
        docker build -t autonomous-agent:latest .

    - name: Stop and remove old container
      run: |
        docker stop autonomous-agent || true
        docker rm autonomous-agent || true

    - name: Run new container
      run: |
        docker run -d \
          --name autonomous-agent \
          --restart always \
          -p 8000:8000 \
          -p 5000:5000 \
          autonomous-agent:latest

    - name: Verify container running
      run: |
        docker ps

    - name: Check API health
      run: |
        sleep 10
        curl -f http://localhost:8000/docs

    - name: Check MLflow health
      run: |
        curl -f http://localhost:5000